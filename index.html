<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blaster Arena</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-wrap">
    <h1>Blaster Arena</h1>
    <p id="info"></p>
    <div class="arena">
      <canvas id="gameCanvas" width="800" height="500"></canvas>

      <section id="upgradeMenu" class="upgrade-menu" aria-modal="true" aria-labelledby="upgradeTitle">
        <h2 id="upgradeTitle">Choose an Upgrade</h2>
        <button id="gunUpgradeBtn" type="button">Upgrade Gun</button>
        <button id="armorUpgradeBtn" type="button">Upgrade Armor</button>
      </section>
    </div>

    <section class="touch-controls" aria-label="Touch controls">
      <div class="move-pad">
        <button type="button" class="control-btn up" data-key="ArrowUp">Up</button>
        <button type="button" class="control-btn left" data-key="ArrowLeft">Left</button>
        <button type="button" class="control-btn down" data-key="ArrowDown">Down</button>
        <button type="button" class="control-btn right" data-key="ArrowRight">Right</button>
      </div>
      <button type="button" class="control-btn shoot" data-key=" ">Shoot</button>
    </section>

    <section class="action-controls" aria-label="Item controls">
      <button id="shieldBtn" type="button" class="item-btn">Shield Locked</button>
      <button id="laserGunBtn" type="button" class="item-btn">Laser Locked</button>
    </section>

    <button id="restartBtn" type="button">Restart</button>
  </main>
  <script src="app.js"></script>
</body>
</html>
